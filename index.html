<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Shop</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  margin: 0;
}

header {
  padding: 20px;
  text-align: center;
  font-size: 24px;
  background: #111;
}

.container {
  display: flex;
}

.products {
  width: 70%;
  display: flex;
  flex-wrap: wrap;
}

.product {
  background: #1a1a1a;
  margin: 15px;
  padding: 15px;
  border-radius: 10px;
  width: 200px;
  text-align: center;
}

.product button {
  background: #00ff88;
  border: none;
  padding: 10px;
  cursor: pointer;
}

.cart {
  width: 30%;
  background: #111;
  padding: 20px;
}

.cart-item {
  margin-bottom: 10px;
}

.total {
  font-size: 20px;
  margin-top: 10px;
}

input {
  width: 90%;
  margin: 5px 0;
  padding: 8px;
}

button.order {
  background: #00ff88;
  padding: 10px;
  width: 100%;
}
</style>
</head>

<body>

<header>🛒 МАГАЗИН</header>

<div class="container">

<div class="products" id="products"></div>

<div class="cart">
  <h2>🧺 Корзина</h2>
  <div id="cart"></div>
  <div class="total" id="total">0 грн</div>

  <h3>📦 Оформление</h3>
  <input id="name" placeholder="Имя">
  <input id="phone" placeholder="Телефон">
  <input id="address" placeholder="Адрес">

  <button class="order" onclick="order()">Оформить</button>
</div>

</div>

<script>
let cart = [];

fetch("/products")
.then(res => res.json())
.then(data => {
  const container = document.getElementById("products");

  data.forEach(p => {
    container.innerHTML += `
      <div class="product">
        <h3>${p.name}</h3>
        <p>${p.price} грн</p>
        <button onclick='add(${JSON.stringify(p)})'>В корзину</button>
      </div>
    `;
  });
});

function add(p){
  cart.push(p);
  renderCart();
}

function remove(index){
  cart.splice(index,1);
  renderCart();
}

function renderCart(){
  const div = document.getElementById("cart");
  div.innerHTML = "";

  let total = 0;

  cart.forEach((p,i) => {
    total += p.price;
    div.innerHTML += `
      <div class="cart-item">
        ${p.name} - ${p.price}
        <button onclick="remove(${i})">❌</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = total + " грн";
}

function order(){
  fetch("/order", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      name: document.getElementById("name").value,
      phone: document.getElementById("phone").value,
      address: document.getElementById("address").value,
      cart
    })
  })
  .then(() => {
    alert("Заказ отправлен!");
    cart = [];
    renderCart();
  });
}
</script>

</body>
</html>
