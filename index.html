<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Shop</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  background: #020617;
  padding: 20px;
  text-align: center;
  font-size: 26px;
}

.container {
  display: flex;
  flex-wrap: wrap;
}

.products {
  width: 70%;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.product {
  background: #1e293b;
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
  width: 220px;
  text-align: center;
  transition: 0.3s;
}

.product:hover {
  transform: scale(1.05);
}

.product img {
  width: 100%;
  border-radius: 10px;
}

.product button {
  background: #22c55e;
  border: none;
  padding: 10px;
  width: 100%;
  margin-top: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.cart {
  width: 30%;
  background: #020617;
  padding: 20px;
}

.cart-item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.total {
  font-size: 20px;
  margin-top: 10px;
  color: #22c55e;
}

input {
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  border-radius: 6px;
  border: none;
}

button.order {
  background: #22c55e;
  padding: 12px;
  width: 100%;
  margin-top: 10px;
  border-radius: 8px;
  cursor: pointer;
}

/* 📱 МОБИЛКА */
@media (max-width: 768px) {
  .products { width: 100%; }
  .cart { width: 100%; }
}
</style>
</head>

<body>

<header>🛒 Dropshop</header>

<div class="container">

<div class="products" id="products"></div>

<div class="cart">
  <h2>🧺 Корзина</h2>
  <div id="cart"></div>
  <div class="total" id="total">0 грн</div>

  <h3>📦 Оформление</h3>
  <input id="name" placeholder="Имя">
  <input id="phone" placeholder="Телефон">
  <input id="address" placeholder="Адрес">

  <button class="order" onclick="order()">Оформить заказ</button>
</div>

</div>

<script>
let cart = [];

fetch("/products")
.then(res => res.json())
.then(data => {
  const container = document.getElementById("products");

  data.forEach(p => {
    container.innerHTML += `
      <div class="product">
        <img src="${p.image || 'https://via.placeholder.com/200'}">
        <h3>${p.name}</h3>
        <p>${p.price} грн</p>
        <button onclick='add(${JSON.stringify(p)})'>В корзину</button>
      </div>
    `;
  });
});

function add(p){
  cart.push(p);
  renderCart();
}

function remove(i){
  cart.splice(i,1);
  renderCart();
}

function renderCart(){
  const div = document.getElementById("cart");
  div.innerHTML = "";

  let total = 0;

  cart.forEach((p,i) => {
    total += p.price;
    div.innerHTML += `
      <div class="cart-item">
        ${p.name} (${p.price})
        <button onclick="remove(${i})">❌</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = total + " грн";
}

function order(){
  fetch("/order", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      name: document.getElementById("name").value,
      phone: document.getElementById("phone").value,
      address: document.getElementById("address").value,
      cart
    })
  })
  .then(() => {
    alert("Заказ отправлен!");
    cart = [];
    renderCart();
  });
}
</script>

</body>
</html>
