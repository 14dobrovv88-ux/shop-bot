<link rel="stylesheet" href="styles.css">
<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="styles.css">
<title>Магазин</title>
</head>
<body>

<header>🛒 Магазин</header>

<div class="grid" id="products"></div>

<script src="script.js"></script>

<script>
fetch("/products")
.then(r=>r.json())
.then(data=>{
  data.forEach(p=>{
    document.getElementById("products").innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>${p.price} грн</p>
        <button onclick='addToCart(${JSON.stringify(p)})'>В кошик</button>
        <a href="product.html?id=${p.id}">Детальніше</a>
      </div>
    `;
  });
});
</script>

<a href="cart.html">🧺 Кошик</a>

</body>
</html>
