<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Shop</title>
  <style>
    body { font-family: Arial; background:#111; color:#fff; text-align:center; }
    .product { border:1px solid #333; margin:20px; padding:20px; }
    button { padding:10px; margin:5px; cursor:pointer; }
  </style>
</head>
<body>

<h1>🛒 Магазин</h1>

<div id="products"></div>

<h2>🧺 Корзина</h2>
<div id="cart"></div>

<h2>📦 Оформление</h2>
<input id="name" placeholder="Имя"><br><br>
<input id="phone" placeholder="Телефон"><br><br>
<input id="address" placeholder="Адрес"><br><br>
<button onclick="order()">Оформить заказ</button>

<script>
let cart = [];

fetch("/products")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("products");

    data.forEach(p => {
      const div = document.createElement("div");
      div.className = "product";

      div.innerHTML = `
        <h3>${p.name}</h3>
        <p>${p.price} грн</p>
        <button onclick='add(${JSON.stringify(p)})'>В корзину</button>
      `;

      container.appendChild(div);
    });
  });

function add(product){
  cart.push(product);
  renderCart();
}

function renderCart(){
  const cartDiv = document.getElementById("cart");
  cartDiv.innerHTML = "";

  cart.forEach(p => {
    cartDiv.innerHTML += `<p>${p.name} - ${p.price}</p>`;
  });
}

function order(){
  fetch("/order", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name: document.getElementById("name").value,
      phone: document.getElementById("phone").value,
      address: document.getElementById("address").value,
      cart
    })
  })
  .then(res => res.json())
  .then(() => {
    alert("Заказ оформлен!");
    cart = [];
    renderCart();
  });
}
</script>

</body>
</html>
