<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Магазин</title>
</head>
<body>

<h1>🛒 Магазин</h1>
<div id="products"></div>

<script>
fetch("/products")
.then(r=>r.json())
.then(data=>{
  data.forEach(p=>{
    document.body.innerHTML += `
      <div>
        <h3>${p.name}</h3>
        <img src="${p.image}" width="150">
        <p>${p.price} грн</p>
        <a href="/product.html?id=${p.id}">Детальніше</a>
      </div>
    `;
  });
});
</script>

<a href="/cart.html">🧺 Перейти в корзину</a>

</body>
</html>
